name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Backend
      - name: Install backend dependencies
        working-directory: ./ai-finance-backend
        run: npm install

      # Frontend
      - name: Install frontend dependencies
        working-directory: ./ai-finance-frontend
        run: npm install

      - name: Build frontend
        working-directory: ./ai-finance-frontend
        run: npm run build