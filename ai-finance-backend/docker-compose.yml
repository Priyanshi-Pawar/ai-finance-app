version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: finance_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2203
      POSTGRES_DB: ai_finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: finance_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finance_app
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 2203
      DB_NAME: ai_finance
      DB_SSL: "false"

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: mysupersecretkey123
      JWT_REFRESH_SECRET: super_refresh_secret_key
      WEBHOOK_SECRET: supersecret123
    command: node src/server.js

volumes:
  pgdata: